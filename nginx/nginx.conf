# ─── Reference Docs ───────────────────────────────────────────────────────────
#
# Nginx beginner's guide (start here):
#   https://nginx.org/en/docs/beginners_guide.html
#
# Nginx core directives (events, http, server, location):
#   https://nginx.org/en/docs/dirindex.html
#
# Nginx reverse proxy module (proxy_pass, proxy_set_header, proxy_buffering):
#   https://nginx.org/en/docs/http/ngx_http_proxy_module.html
#
# ──────────────────────────────────────────────────────────────────────────────

# Required — defines how many connections Nginx can handle
events {
    worker_connections 1024;
}

http {
    # Tells Nginx what Content-Type to set for each file extension
    # (so .js files get application/javascript, .css get text/css, etc.)
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allows uploading audio files up to 50MB
    client_max_body_size 50M;

    server {
        listen 80;
        server_name localhost;

        # ── API traffic → API Gateway ─────────────────────────────────────
        location /api/ {
            proxy_pass         http://gateway:3000;

            # Forward the original headers — without these the gateway
            # receives the request with no identity
            proxy_set_header   Authorization    $http_authorization;
            proxy_set_header   Cookie           $http_cookie;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }

        # ── Audio streaming → API Gateway (no buffering) ──────────────────
        # Streaming needs special treatment — Nginx must not buffer the
        # response or the audio player will wait for the full file
        # before starting playback
        location /api/stream/ {
            # Modify to redirect to the stream path...
            proxy_pass         http://gateway:3000;
            proxy_buffering    off;

            proxy_set_header   Authorization    $http_authorization;
            proxy_set_header   Range            $http_range;
            proxy_set_header   Host             $host;
        }

        # ── React frontend ────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:80;
        }
    }
}
